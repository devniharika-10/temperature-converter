<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter Pro 🌡</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙 Dark Mode</button>

    <div class="container">
        <h1>🌡 Temperature Converter</h1>
        
        <div class="emoji-container" id="tempEmoji">😐</div>
        
        <div class="input-group">
            <input 
                type="number" 
                id="tempInput" 
                placeholder="Enter temperature"
                step="any"
            >
        </div>
        
        <div class="converter-options">
            <select id="fromUnit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>
            
            <span class="arrow">→</span>
            
            <select id="toUnit">
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="celsius">Celsius (°C)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>
        </div>
        
        <button class="convert-btn" id="convertBtn">Convert</button>
        
        <div class="result-container">
            <h2 id="result">--</h2>
        </div>

        <div class="quick-conversions">
            <h3>Quick Conversions:</h3>
            <div class="quick-btns">
                <button onclick="setQuickValue(0)">0°C</button>
                <button onclick="setQuickValue(100)">100°C</button>
                <button onclick="setQuickValue(32)">32°F</button>
                <button onclick="setQuickValue(98.6)">98.6°F</button>
                <button onclick="setQuickValue(273.15)">273.15K</button>
                <button onclick="setQuickValue(373.15)">373.15K</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
